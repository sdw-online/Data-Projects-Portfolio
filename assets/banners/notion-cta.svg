    <path d="M -7 0 L 7 0 M 2 -6 L 8 0 L 2 6" stroke="#1f2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <line x1="150" y1="140" x2="1060" y2="140" stroke="#f59e0b" stroke-opacity="0.18" stroke-width="1"/>
