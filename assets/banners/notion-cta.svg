<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="1200" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="amberEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="#fbbf24" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="160" fill="url(#bg)"/>
  <rect width="1200" height="160" fill="url(#dots)"/>

  <rect width="6" height="160" fill="url(#amberEdge)"/>

  <g transform="translate(40, 40)">
    <rect width="80" height="80" rx="14" fill="#1f2937" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="40" y="55" text-anchor="middle" font-family="Inter, sans-serif" font-size="38" font-weight="800" fill="#f59e0b" letter-spacing="-1">N</text>
  </g>

  <g transform="translate(150, 0)">
    <text x="0" y="66" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" letter-spacing="2.2">NOTION PACK</text>
    <text x="0" y="98" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#ffffff" letter-spacing="-0.6">Get the Data Projects Notion Pack</text>
    <text x="0" y="124" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#9ca3af" letter-spacing="-0.2">Full blueprints, datasets, and stack maps</text>
  </g>

  <g transform="translate(1110, 80)">
